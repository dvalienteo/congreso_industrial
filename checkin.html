<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Check-in — Congreso II</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{
    --azul:#0a1628; --azul2:#112240; --azul3:#1a3050;
    --verde:#1db96b; --verde2:#0d9153;
    --dorado:#c9a94b; --dorado2:#f0d080;
    --blanco:#f4f1ea; --gris:#8899aa;
    --rojo:#e74c3c; --naranja:#e67e22;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{min-height:100vh;background:var(--azul);font-family:'Barlow',sans-serif;color:var(--blanco);}

  /* LOGIN */
  #loginScreen{
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(ellipse 80% 60% at 80% 20%,rgba(29,185,107,.08) 0%,transparent 60%);
  }
  #loginScreen.hidden{display:none;}
  .login-box{
    background:var(--azul2);border:1px solid rgba(29,185,107,.3);
    border-radius:6px;padding:40px 36px;width:100%;max-width:400px;
    animation:fadeUp .6s ease both;
  }
  .login-title{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:3px;color:var(--verde);margin-bottom:4px;}
  .login-sub{font-size:.82rem;color:var(--gris);margin-bottom:28px;}

  /* MAIN */
  #mainScreen{display:none;min-height:100vh;}
  #mainScreen.active{display:block;}

  /* Topbar */
  .topbar{
    background:var(--azul2);border-bottom:1px solid rgba(29,185,107,.2);
    padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
  }
  .topbar-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;color:var(--verde);}
  .topbar-user{font-size:.8rem;color:var(--gris);}
  .topbar-user strong{color:var(--blanco);}

  /* Contador en topbar */
  .counter-pill{
    background:rgba(29,185,107,.12);border:1px solid rgba(29,185,107,.25);
    border-radius:20px;padding:4px 16px;font-size:.82rem;
    color:var(--verde);font-weight:600;
  }

  .content{max-width:780px;margin:0 auto;padding:28px 20px;}

  /* Tabs */
  .tabs{display:flex;gap:4px;margin-bottom:28px;border-bottom:1px solid rgba(29,185,107,.2);}
  .tab{
    background:none;border:none;padding:10px 22px;color:var(--gris);
    font-family:'Barlow',sans-serif;font-size:.9rem;font-weight:500;
    cursor:pointer;border-bottom:2px solid transparent;transition:.2s;letter-spacing:1px;
  }
  .tab.active{color:var(--verde);border-bottom-color:var(--verde);}

  .form-section{display:none;}
  .form-section.active{display:block;animation:fadeUp .4s ease both;}

  /* Fields */
  .field-group{margin-bottom:20px;}
  label{display:block;font-size:.78rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--gris);margin-bottom:7px;font-weight:600;}
  input[type=text],input[type=password]{
    width:100%;background:var(--azul3);border:1px solid rgba(29,185,107,.2);
    border-radius:4px;padding:12px 16px;color:var(--blanco);font-family:'Barlow',sans-serif;
    font-size:1rem;outline:none;transition:border-color .2s;letter-spacing:1px;
  }
  input:focus{border-color:var(--verde);}

  .search-row{display:flex;gap:10px;}
  .search-row input{flex:1;}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:12px 26px;border:none;border-radius:4px;cursor:pointer;
    font-family:'Barlow',sans-serif;font-size:.9rem;font-weight:600;
    letter-spacing:1px;text-transform:uppercase;transition:.2s;
  }
  .btn-green{background:linear-gradient(135deg,var(--verde),var(--verde2));color:#fff;}
  .btn-green:hover{opacity:.88;transform:translateY(-1px);}
  .btn-secondary{background:var(--azul3);color:var(--blanco);border:1px solid rgba(29,185,107,.25);}
  .btn-secondary:hover{border-color:var(--verde);}
  .btn-checkin{
    background:linear-gradient(135deg,var(--verde),var(--verde2));
    color:#fff;padding:16px 40px;font-size:1.05rem;letter-spacing:2px;
    border-radius:6px;border:none;cursor:pointer;width:100%;margin-top:12px;
    transition:all .25s;
  }
  .btn-checkin:hover{box-shadow:0 6px 24px rgba(29,185,107,.4);transform:translateY(-2px);}
  .btn-checkin:disabled{opacity:.4;cursor:not-allowed;transform:none;}

  /* Resultados búsqueda */
  #resultadosNombre{
    margin-top:12px;max-height:280px;overflow-y:auto;
    border:1px solid rgba(29,185,107,.15);border-radius:4px;
  }
  .result-item{
    padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;
    align-items:center;border-bottom:1px solid rgba(29,185,107,.08);transition:background .2s;
  }
  .result-item:last-child{border-bottom:none;}
  .result-item:hover{background:rgba(29,185,107,.07);}
  .result-name{font-weight:600;font-size:.9rem;}
  .result-meta{font-size:.78rem;color:var(--gris);}
  .badge-ticket{
    font-size:.7rem;padding:3px 10px;border-radius:20px;
    background:rgba(29,185,107,.12);color:var(--verde);font-weight:700;
  }
  .badge-done{background:rgba(231,76,60,.12);color:var(--rojo);}

  /* Card resultado */
  #resultadoCard{
    background:var(--azul3);border:2px solid rgba(29,185,107,.3);
    border-radius:8px;padding:28px;margin-top:16px;
    display:none;animation:fadeUp .4s ease both;
  }
  .result-grid{
    display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px;
  }
  @media(max-width:600px){.result-grid{grid-template-columns:1fr;}}
  .result-field .label-tag{
    font-size:.7rem;text-transform:uppercase;letter-spacing:1.5px;
    color:var(--verde);margin-bottom:4px;font-weight:700;
  }
  .result-field .value{font-size:1.1rem;font-weight:700;color:var(--blanco);}

  /* Ya hizo check-in */
  .checkin-done{
    background:rgba(29,185,107,.1);border:1px solid rgba(29,185,107,.3);
    border-radius:6px;padding:14px 18px;text-align:center;
    color:var(--verde);font-weight:600;font-size:.95rem;margin-top:8px;
  }
  .saldo-warn{
    background:rgba(230,126,34,.1);border:1px solid rgba(230,126,34,.3);
    border-radius:6px;padding:10px 16px;font-size:.85rem;color:var(--naranja);margin-bottom:12px;
  }

  /* Alertas */
  .alert{padding:12px 16px;border-radius:4px;margin:12px 0;font-size:.88rem;display:none;align-items:center;gap:10px;}
  .alert.show{display:flex;}
  .alert-ok{background:rgba(29,185,107,.12);border:1px solid rgba(29,185,107,.3);color:var(--verde);}
  .alert-err{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);color:var(--rojo);}

  /* Éxito check-in animado */
  #successCard{
    display:none;text-align:center;padding:40px 20px;
    animation:fadeUp .5s ease both;
  }
  .success-icon{font-size:5rem;margin-bottom:16px;animation:bounce .6s ease;}
  .success-name{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;color:var(--verde);}
  .success-meta{color:var(--gris);font-size:.9rem;margin-top:8px;}

  .no-result{padding:18px;text-align:center;color:var(--gris);font-size:.88rem;}

  .spinner{
    display:inline-block;width:14px;height:14px;
    border:2px solid rgba(29,185,107,.3);border-top-color:var(--verde);
    border-radius:50%;animation:spin .6s linear infinite;
  }

  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes bounce{0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}
</style>
</head>
<body>

<!-- ═══════ LOGIN ═══════ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-title">✅ Check-in</div>
    <div class="login-sub">IV Congreso de Ingeniería Industrial</div>
    <div class="field-group">
      <label>Usuario</label>
      <input type="text" id="loginUser" placeholder="Tu usuario" autocomplete="off"/>
    </div>
    <div class="field-group">
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••"/>
    </div>
    <div id="loginAlert" class="alert alert-err"></div>
    <button class="btn btn-green" style="width:100%;margin-top:8px;" onclick="doLogin()">Ingresar</button>
    <div style="margin-top:16px;text-align:center;">
      <a href="index.html" style="color:var(--gris);font-size:.8rem;text-decoration:none;">← Volver al menú</a>
    </div>
  </div>
</div>

<!-- ═══════ MAIN ═══════ -->
<div id="mainScreen">
  <div class="topbar">
    <span class="topbar-title">✅ Check-in — Congreso</span>
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
      <span class="counter-pill">✓ <span id="contadorCheckin">0</span> registrados</span>
      <span class="topbar-user">Registrador: <strong id="userNombre">—</strong></span>
      <a href="index.html" style="color:var(--gris);text-decoration:none;font-size:.8rem;">← Menú</a>
    </div>
  </div>

  <div class="content">

    <div class="tabs">
      <button class="tab active" onclick="switchTab('ticket')">Por No. Ticket</button>
      <button class="tab" onclick="switchTab('nombre')">Por Nombre</button>
    </div>

    <!-- ── TAB: POR TICKET ── -->
    <div id="tabTicket" class="form-section active">
      <div class="field-group">
        <label>No. Ticket</label>
        <div class="search-row">
          <input type="text" id="inputTicket" placeholder="Ingrese número de ticket..." style="font-size:1.3rem;padding:14px 18px;letter-spacing:3px;"/>
          <button class="btn btn-secondary" onclick="buscarPorTicket()">🔍 Buscar</button>
        </div>
      </div>

      <div id="alertTicket" class="alert"></div>

      <div id="resultadoCard">
        <!-- Saldo pendiente warning -->
        <div id="saldoWarn" class="saldo-warn" style="display:none;"></div>

        <div class="result-grid">
          <div class="result-field">
            <div class="label-tag">No. Ticket</div>
            <div class="value" id="rTicket">—</div>
          </div>
          <div class="result-field">
            <div class="label-tag">Participante</div>
            <div class="value" id="rNombre">—</div>
          </div>
          <div class="result-field">
            <div class="label-tag">Ciclo / Categoría</div>
            <div class="value" id="rCiclo">—</div>
          </div>
        </div>

        <div id="yaCheckin" class="checkin-done" style="display:none;"></div>
        <div id="alertCheckin" class="alert"></div>
        <button class="btn-checkin" id="btnCheckin" onclick="registrarCheckin()" style="display:none;">
          ✅ CONFIRMAR CHECK-IN
        </button>
      </div>

      <!-- Éxito -->
      <div id="successCard">
        <div class="success-icon">🎉</div>
        <div class="success-name" id="successNombre">—</div>
        <div class="success-meta" id="successMeta">—</div>
        <button class="btn btn-secondary" onclick="nuevoCheckin()" style="margin-top:24px;">
          ↩ Nuevo Check-in
        </button>
      </div>
    </div>

    <!-- ── TAB: POR NOMBRE ── -->
    <div id="tabNombre" class="form-section">
      <div class="field-group">
        <label>Buscar por Nombre</label>
        <div class="search-row">
          <input type="text" id="inputNombre" placeholder="Escriba nombre o apellido..." oninput="buscarPorNombreTR()"/>
          <button class="btn btn-secondary" onclick="buscarPorNombre()">🔍 Buscar</button>
        </div>
      </div>
      <div id="resultadosNombre"></div>
    </div>

  </div>
</div>

<script>
var GAS_URL = "https://script.google.com/macros/s/AKfycbzceeqLOr2Mwf5OY2f6DNlFm97akxLCUE9BnMnTKJ7Q9OZ6wyXIWdqWCPDDuQ_BFtTU/exec";

var currentUser    = null;
var filaCheckin    = null;
var buscarTimerNom = null;

// ════════════════════════════════
// LOGIN
// ════════════════════════════════
function doLogin(){
  var user = document.getElementById('loginUser').value.trim();
  var pass = document.getElementById('loginPass').value.trim();
  if(!user||!pass){ showAlert('loginAlert','err','Ingresa usuario y contraseña.'); return; }

  callGAS({action:'loginCheckin', usuario:user, pass:pass}, function(res){
    if(res.ok){
      currentUser = res;
      document.getElementById('userNombre').textContent = res.nombre;
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainScreen').classList.add('active');
    } else {
      showAlert('loginAlert','err', res.mensaje);
    }
  });
}
document.getElementById('loginPass').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });

// ════════════════════════════════
// TABS
// ════════════════════════════════
function switchTab(t){
  document.querySelectorAll('.tab').forEach(function(el,i){
    el.classList.toggle('active',(i===0&&t==='ticket')||(i===1&&t==='nombre'));
  });
  document.getElementById('tabTicket').classList.toggle('active',t==='ticket');
  document.getElementById('tabNombre').classList.toggle('active',t==='nombre');
  limpiarTicket();
}

// ════════════════════════════════
// BUSCAR POR TICKET
// ════════════════════════════════
function buscarPorTicket(){
  var t = document.getElementById('inputTicket').value.trim();
  if(!t){ showAlert('alertTicket','err','Ingresa un número de ticket.'); return; }

  hideAlert('alertTicket');
  document.getElementById('resultadoCard').style.display='none';
  document.getElementById('successCard').style.display='none';

  callGAS({action:'buscarPorTicket', numTicket:t}, function(res){
    if(!res || !res.encontrado){
      showAlert('alertTicket','err','Ticket #'+t+' no encontrado en el listado.');
      return;
    }
    mostrarResultadoCard(res);
  });
}
document.getElementById('inputTicket').addEventListener('keydown', function(e){ if(e.key==='Enter') buscarPorTicket(); });

// ════════════════════════════════
// BUSCAR POR NOMBRE
// ════════════════════════════════
function buscarPorNombreTR(){
  clearTimeout(buscarTimerNom);
  var q = document.getElementById('inputNombre').value.trim();
  if(q.length<2){ document.getElementById('resultadosNombre').innerHTML=''; return; }
  buscarTimerNom = setTimeout(buscarPorNombre, 350);
}

function buscarPorNombre(){
  var q = document.getElementById('inputNombre').value.trim();
  if(!q) return;
  var cont = document.getElementById('resultadosNombre');
  cont.innerHTML='<div class="no-result"><span class="spinner"></span> Buscando...</div>';

  callGAS({action:'buscarPorNombreCheckin', query:q}, function(res){
    if(!res||res.length===0){
      cont.innerHTML='<div class="no-result">No se encontraron resultados.</div>';
      return;
    }
    var html='';
    res.forEach(function(p){
      var yaCI = p.checkin && p.checkin!=='';
      html+='<div class="result-item" onclick="seleccionarPorNombre('+p.fila+')">'
          +'<div><div class="result-name">'+escHtml(p.nombre)+'</div>'
          +'<div class="result-meta">Ciclo: '+escHtml(p.ciclo)+(p.seccion?' · '+p.seccion:'')+'</div></div>'
          +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">'
          +'<span class="badge-ticket">Ticket: '+escHtml(p.ticket)+'</span>'
          +(yaCI?'<span style="font-size:.7rem;color:var(--rojo);">Ya hizo check-in</span>':'')
          +'</div>'
          +'</div>';
    });
    cont.innerHTML=html;
  });
}

function seleccionarPorNombre(fila){
  callGAS({action:'buscarPorFila', fila:fila}, function(res){
    if(!res||!res.encontrado) return;
    switchTab('ticket');
    document.getElementById('inputTicket').value = res.ticket;
    mostrarResultadoCard(res);
  });
}

// ════════════════════════════════
// MOSTRAR CARD
// ════════════════════════════════
function mostrarResultadoCard(res){
  filaCheckin = res.fila;

  document.getElementById('rTicket').textContent = res.ticket;
  document.getElementById('rNombre').textContent = res.nombre;
  document.getElementById('rCiclo').textContent  = res.ciclo + (res.seccion?' · '+res.seccion:'');

  // Saldo pendiente
  var sw = document.getElementById('saldoWarn');
  if(res.saldo && res.saldo > 0){
    sw.style.display='block';
    sw.textContent = '⚠️ Atención: este participante tiene un saldo pendiente de Q'+res.saldo.toFixed(2);
  } else { sw.style.display='none'; }

  // ¿Ya hizo check-in?
  var yaCI = document.getElementById('yaCheckin');
  var btnCI = document.getElementById('btnCheckin');
  hideAlert('alertCheckin');
  if(res.checkin && res.checkin!==''){
    yaCI.style.display='block';
    yaCI.textContent = '✅ Check-in ya registrado el: '+res.checkin;
    btnCI.style.display='none';
  } else {
    yaCI.style.display='none';
    btnCI.style.display='block';
  }

  document.getElementById('resultadoCard').style.display='block';
}

// ════════════════════════════════
// REGISTRAR CHECK-IN
// ════════════════════════════════
function registrarCheckin(){
  if(!filaCheckin) return;
  var btn = document.getElementById('btnCheckin');
  btn.disabled=true; btn.textContent='Registrando...';

  callGAS({action:'registrarCheckin', fila:filaCheckin, registrador:currentUser.nombre}, function(res){
    btn.disabled=false; btn.textContent='✅ CONFIRMAR CHECK-IN';
    if(res.ok){
      // Animar éxito
      document.getElementById('resultadoCard').style.display='none';
      var sc = document.getElementById('successCard');
      sc.style.display='block';
      document.getElementById('successNombre').textContent = res.nombre;
      document.getElementById('successMeta').textContent   = 'Ticket #'+res.ticket+' · '+res.ciclo+' · '+res.hora;
      // Incrementar contador
      var cnt = document.getElementById('contadorCheckin');
      cnt.textContent = parseInt(cnt.textContent||0)+1;
    } else {
      showAlert('alertCheckin','err', res.mensaje);
    }
  });
}

// ════════════════════════════════
// UTILIDADES
// ════════════════════════════════
function nuevoCheckin(){
  limpiarTicket();
  document.getElementById('successCard').style.display='none';
  document.getElementById('inputTicket').focus();
}
function limpiarTicket(){
  filaCheckin=null;
  document.getElementById('inputTicket').value='';
  document.getElementById('resultadoCard').style.display='none';
  hideAlert('alertTicket');
  hideAlert('alertCheckin');
}

function showAlert(id,tipo,msg){
  var el=document.getElementById(id);
  el.className='alert show '+(tipo==='ok'?'alert-ok':'alert-err');
  el.textContent=msg;
}
function hideAlert(id){ document.getElementById(id).className='alert'; }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/'/g,'&#39;'); }

function callGAS(data,cb){
  fetch(GAS_URL,{
    method:'POST',headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(data)
  })
  .then(function(r){return r.json();})
  .then(cb)
  .catch(function(e){console.error(e);cb({ok:false,mensaje:'Error de conexión.'});});
}
</script>
</body>
</html>
