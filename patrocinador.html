<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal del Patrocinador — IV Congreso Ingeniería Industrial</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* TODO TU CSS PERMANECE IGUAL */
:root {
  --orange:#E8580A; --orange2:#FF8C00; --navy:#0D1F3C; --navy2:#162B52; --navy3:#1E3A6E;
  --gold:#F5A623; --white:#FFFFFF; --bg:#F0F2F7; --border:#D1D8E8; --text:#0D1F3C;
  --muted:#6B7A99; --success:#1A7F5A; --success-bg:#D4EDDA; --danger:#C0392B;
  --danger-bg:#FDECEA; --font:'Barlow',sans-serif; --display:'Barlow Condensed',sans-serif;
  --radius:10px; --radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
nav{background:var(--navy);display:flex;align-items:center;padding:0 28px;height:58px;box-shadow:0 3px 20px rgba(13,31,60,.35);position:sticky;top:0;z-index:100;}
.nav-logo{height:42px;width:auto;object-fit:contain;}
/* ... (Se mantienen todos tus estilos originales) ... */
.container{max-width:1200px;margin:0 auto;padding:24px 20px 60px;}
.card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:34px 24px;box-shadow:0 2px 12px rgba(13,31,60,.06);height:100%;}
.btn-primary{background:var(--orange);color:var(--white);border:none;padding:14px 24px;border-radius:var(--radius);font-family:var(--display);font-size:16px;font-weight:700;text-transform:uppercase;cursor:pointer;width:100%;transition:all .25s;}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--navy);color:white;padding:14px 28px;border-radius:50px;font-size:14px;display:none;z-index:1000;}
#toast.show{display:block;}
</style>
</head>
<body>

<nav>
  <img src="https://i.ibb.co/Kx7c7gDZ/01-Logo-2026-3.png" class="nav-logo" alt="Logo IV Congreso">
</nav>

<div class="container">
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 1000px; margin: 0 auto;">
    
    <div class="card">
      <h2 style="font-family:var(--display); font-weight:900; color:var(--navy); margin-bottom:20px; text-transform:uppercase;">1. Verificar Registro</h2>
      <div style="margin-bottom:20px;">
        <label style="display:block; font-family:var(--display); font-weight:700; font-size:14px; margin-bottom:8px; color:var(--navy); text-transform:uppercase;">Nombre del Patrocinador</label>
        <input type="text" id="v-patron" placeholder="Ej: Mi Empresa S.A." style="width:100%; padding:14px; border:1px solid var(--border); border-radius:var(--radius); font-size:16px;">
      </div>
      <div style="margin-bottom:25px;">
        <label style="display:block; font-family:var(--display); font-weight:700; font-size:14px; margin-bottom:8px; color:var(--navy); text-transform:uppercase;">No. de Recibo</label>
        <input type="text" id="v-no" placeholder="001" style="width:100%; padding:14px; border:1px solid var(--border); border-radius:var(--radius); font-size:16px;">
      </div>
      <button class="btn-primary" onclick="verifyReceipt()">Verificar Datos</button>
    </div>

    <div class="card" id="upload-section" style="opacity:0.5; pointer-events:none; transition: all 0.3s;">
      <h2 id="welcome-msg" style="font-family:var(--display); font-weight:900; color:var(--navy); margin-bottom:20px; text-transform:uppercase;">2. Subir Material</h2>
      <p style="font-size:14px; color:var(--muted); margin-bottom:20px;">Una vez verificado, podrás subir tu logo o material publicitario.</p>
      <div style="border:2px dashed var(--border); padding:30px; text-align:center; border-radius:var(--radius); background:#fafafa; margin-bottom:25px;">
        <input type="file" id="file-input" style="width:100%;">
      </div>
      <button class="btn-primary" id="btn-upload-file" onclick="processUpload()" style="background:var(--navy3);">Enviar Archivo</button>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
// URL de tu Apps Script (Mantenla actualizada)
const sheetsUrl = "https://script.google.com/macros/s/1feN_k3g4mcE01Fl4Jm8Xa8iDHtwne4-K/exec"; 

let verifiedSponsorName = "";

async function verifyReceipt() {
  const patron = document.getElementById('v-patron').value.trim();
  const no = document.getElementById('v-no').value.trim();

  if(!patron || !no) {
    showToast('⚠️ Por favor completa ambos campos');
    return;
  }

  try {
    const res = await fetch(`${sheetsUrl}?action=verify&no=${no.padStart(3,'0')}&patron=${encodeURIComponent(patron)}`);
    const data = await res.json();

    if(data.found) {
      verifiedSponsorName = data.patrocinador; // Guardamos el nombre oficial
      showToast('✅ Registro verificado correctamente');
      
      // Habilitar sección de carga
      const section = document.getElementById('upload-section');
      section.style.opacity = "1";
      section.style.pointerEvents = "auto";
      document.getElementById('welcome-msg').textContent = "HOLA, " + verifiedSponsorName;
    } else {
      showToast('❌ No se encontró el registro. Revisa los datos.');
    }
  }
